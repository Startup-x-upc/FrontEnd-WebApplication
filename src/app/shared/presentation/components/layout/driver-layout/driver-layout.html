<mat-sidenav-container class="driver-layout-container">
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="sidebar-header">
      <h2>ChapaTuRuta</h2>
    </div>

    <div class="user-block" *ngIf="profile()">
      <img [src]="profile()?.photoUrl" alt="Avatar" class="avatar">
      <div class="user-info">
        <span class="user-name">{{ profile()?.fullName }}</span>
        <span class="user-role">Conductor</span>
      </div>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/driver/home" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Panel principal</span>
      </a>
    </mat-nav-list>

    <div class="sidebar-footer">
      <button mat-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Cerrar sesión
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
